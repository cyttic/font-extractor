name: Build & Deploy to Azure VM

# Flow: push to main -> build image -> push to Docker Hub -> SSH to Azure VM -> pull & run.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME   Docker Hub username
#   DOCKERHUB_TOKEN      Docker Hub access token (Account Settings -> Security)
#   AZURE_VM_HOST        VM public IP or hostname
#   AZURE_VM_USER        SSH user on the VM
#   AZURE_VM_SSH_KEY     private SSH key (the matching public key is in the VM's authorized_keys)
#
# Optional secrets/vars (have sane defaults below):
#   AZURE_VM_SSH_PORT    SSH port (default 22)
#   VM_MODELS_DIR        host dir holding craft_mlt_25k.pth (default /opt/font-extractor/models)
#
# The container runs with --network host so 127.0.0.1:8001 inside the container
# reaches the TrOCR server on the VM's existing SSH tunnel. App listens on :8000.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/font-extractor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: ${{ secrets.AZURE_VM_SSH_PORT || 22 }}
          envs: IMAGE
          script: |
            set -e
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/font-extractor:latest"
            MODELS_DIR="${{ secrets.VM_MODELS_DIR || '/opt/font-extractor/models' }}"

            docker pull "$IMAGE"
            docker stop font-extractor 2>/dev/null || true
            docker rm   font-extractor 2>/dev/null || true
            docker run -d \
              --name font-extractor \
              --restart unless-stopped \
              --network host \
              -v "$MODELS_DIR":/app/models:ro \
              "$IMAGE"

            docker image prune -f
